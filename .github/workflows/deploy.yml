name: Compile CV and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v3

      - name: Compile cv.typ to cv.pdf
        run: typst compile --font-path fonts cv.typ cv.pdf

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp cv.pdf _site/cv.pdf

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
